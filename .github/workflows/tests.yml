name: UI + API Test Suite

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run API tests (Newman)
        run: |
          mkdir -p results
          npx newman run API/Disney_API_Collection_v2.postman_collection.json \
            -e API/Disney_API.postman_environment.json \
            --reporters cli,junit \
            --reporter-junit-export results/api-results.xml

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UI tests
        run: npx playwright test

      - name: Upload API results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-results
          path: results/api-results.xml

      - name: Upload UI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/